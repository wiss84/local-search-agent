name: CI & CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default: all jobs get read-only token. Jobs that need more declare it themselves.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # STEP 1: Linting (Always runs, finishes in seconds)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install "ruff>=0.11.0"
      - run: ruff check .
      - run: ruff format . --check

  # ---------------------------------------------------------------------------
  # STEP 2: Fast Tests (Always runs on push and PR, matrix across 3.11/3.12/3.13)
  # Skips @pytest.mark.slow tests via --fast flag.
  # ---------------------------------------------------------------------------
  test-fast:
    name: Fast Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run fast tests (skip @slow)
        run: |
          pytest tests/ \
            --fast \
            -x --tb=short -q \
            --cov=local_search_agent \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --ignore=tests/test_python_api.ipynb
      - name: Upload coverage
        uses: actions/upload-artifact@65c4c4a1ddee5b72af3b9a197bcd42a4a9dc4f5e  # v4.6.0
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # STEP 3: PR-only checks (full suite including @slow + build check)
  # ---------------------------------------------------------------------------
  build-check:
    name: Package build check
    runs-on: ubuntu-latest
    needs: test-fast
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*

  test-full:
    name: Full test suite including slow tests (Python 3.12)
    runs-on: ubuntu-latest
    needs: test-fast
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run ALL tests (including @pytest.mark.slow)
        run: |
          pytest tests/ \
            -x --tb=short -q \
            --cov=local_search_agent \
            --cov-report=term-missing \
            --cov-report=xml:pr-coverage.xml \
            --ignore=tests/test_python_api.ipynb
      - name: Upload PR coverage
        uses: actions/upload-artifact@65c4c4a1ddee5b72af3b9a197bcd42a4a9dc4f5e  # v4.6.0
        with:
          name: pr-coverage-report
          path: pr-coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # STEP 4: Publish to PyPI on version tag push
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [lint, test-fast, build-check]
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/local-search-agent

    permissions:
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1.13
