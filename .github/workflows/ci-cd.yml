name: CI & CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # STEP 1: Linting
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ruff>=0.11.0"
      - run: ruff check .
      - run: ruff format . --check

  # ---------------------------------------------------------------------------
  # STEP 2: Fast Tests
  # ---------------------------------------------------------------------------
  test-fast:
    name: Fast Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade build tools
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Install package with dev dependencies
        run: pip install --no-build-isolation -e ".[dev]"
      - name: Run fast tests (skip @slow)
        run: |
          pytest tests/ \
            --fast \
            -x --tb=short -q \
            --cov=local_search_agent \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --ignore=tests/test_python_api.ipynb
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # STEP 3: PR & Tag Checks
  # ---------------------------------------------------------------------------
  build-check:
    name: Package build check
    runs-on: ubuntu-latest
    needs: test-fast
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*

  test-full:
    name: Full test suite including slow tests (Python 3.12)
    runs-on: ubuntu-latest
    needs: test-fast
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache HuggingFace model weights (docling)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-docling-models-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-docling-models-
      - name: Upgrade build tools
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Install package with dev dependencies
        run: pip install --no-build-isolation -e ".[dev]"
      - name: Run ALL tests (including @pytest.mark.slow)
        run: |
          pytest tests/ \
            -x --tb=short -q \
            --cov=local_search_agent \
            --cov-report=term-missing \
            --cov-report=xml:pr-coverage.xml \
            --ignore=tests/test_python_api.ipynb
      - name: Upload PR coverage
        uses: actions/upload-artifact@v4
        with:
          name: pr-coverage-report
          path: pr-coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # STEP 4: Publish to PyPI on version tag push
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [lint, test-fast, build-check, test-full]
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/local-search-agent

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Build distribution
        run: python -m build
      - name: Check distribution
        run: twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1