<!-- ═══════════════════════════════════════════════════════
     CHAT AREA (messages + input bar)
     ═══════════════════════════════════════════════════════ -->
<div id="chat-area">
  <div id="messages"></div>
  <div id="input-bar">
    <div id="input-wrap">
      <textarea id="query-input" rows="3" placeholder="Ask a question… (Enter to send, Ctrl+Enter for new line)"></textarea>
      <button id="btn-send">Send</button>
    </div>
    <div class="input-hint">↑ ↓ cycle history &nbsp;·&nbsp; Enter to send &nbsp;·&nbsp; Ctrl+Enter for new line &nbsp;·&nbsp; Ctrl+/ toggle drawer</div>
  </div>
</div>
