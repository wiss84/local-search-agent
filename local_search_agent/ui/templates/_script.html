<script>
/* =============================================================
   CONFIG
   ============================================================= */
const API = 'http://127.0.0.1:{{ port }}/api/ui';
const MODEL_CONTEXT_LIMITS = {
  'gemma-4-31b-it':        256000,
  'gemma-4-26b-a4b-it':    256000,
  'gemini-3.1-flash-lite': 256000,
  'gpt-4o':                128000,
  'gpt-4-turbo':           128000,
  'claude-opus-4':         200000,
  'claude-sonnet-4':       200000,
};

function getModelContextLimit(model) {
  if (!model) return 0;
  if (MODEL_CONTEXT_LIMITS[model] !== undefined) return MODEL_CONTEXT_LIMITS[model];
  if (model.startsWith('gemma-'))    return 256000;
  if (model.startsWith('gemini-'))   return 1000000;
  if (model.startsWith('gpt-'))      return 128000;
  if (model.startsWith('claude-'))   return 200000;
  return 0;
}

/* =============================================================
   STATE
   ============================================================= */
const state = {
  workspace: null,
  workspaces: [],
  sessionId: null,
  sessions: [],
  drawerPinned: false,
  streaming: false,
  queryHistory: [],
  historyIndex: -1,
  sessionTokens: { query: 0, reply: 0 },
  provider: 'google',
  model: 'gemma-4-31b-it',
  activeToolCards: {},
};

/* =============================================================
   DOM REFS
   ============================================================= */
const $ = id => document.getElementById(id);
const dom = {
  messages:        $('messages'),
  queryInput:      $('query-input'),
  btnSend:         $('btn-send'),
  drawerContent:   $('drawer-content'),
  drawerEmpty:     $('drawer-empty'),
  toolDrawer:      $('tool-drawer'),
  sessionList:     $('session-list'),
  workspaceSelect: $('workspace-select'),
  providerSelect:  $('provider-select'),
  modelInput:      $('model-input'),
  tokenLabel:      $('token-label'),
  tokenBar:        $('token-bar'),
  dotServer:       $('dot-server'),
  dotMeili:        $('dot-meili'),
  agentMsg:        $('status-agent-msg'),
};

/* =============================================================
   UTILITIES
   ============================================================= */
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function renderMarkdown(text) {
  const html = marked.parse(text, { breaks: true });
  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  wrap.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
  return wrap.innerHTML;
}

function scrollBottom() {
  dom.messages.scrollTop = dom.messages.scrollHeight;
}

function autoResizeTextarea() {
  const ta = dom.queryInput;
  if (!ta) return;
  ta.style.height = 'auto';
  const minH = 66; // 3 lines at 14px font, 1.5 line-height + padding
  ta.style.height = Math.max(minH, Math.min(ta.scrollHeight, 150)) + 'px';
}

function toolColor(toolName) {
  if (toolName.includes('search')) return 'search';
  if (toolName.includes('fetch') || toolName.includes('read')) return 'fetch';
  if (toolName.includes('graph') || toolName.includes('link')) return 'graph';
  return 'search';
}

function _new_call_id() {
  return Math.random().toString(36).substr(2, 9);
}

/* =============================================================
   HEALTH POLLING
   ============================================================= */
async function pollHealth() {
  try {
    const h = await api('/health');
    dom.dotServer.className = 'status-dot ok';
    // Meilisearch can be "ok", "offline", or error message; we show ok or err
    const meiliStatus = (h && h.meilisearch === 'ok') ? 'ok' : 'err';
    dom.dotMeili.className  = `status-dot ${meiliStatus}`;
    if (meiliStatus !== 'ok') {
      console.warn('Meilisearch status:', h.meilisearch);
    }
  } catch (e) {
    console.error('Health check failed:', e);
    dom.dotServer.className = 'status-dot err';
    dom.dotMeili.className  = 'status-dot unknown';
  }
}

/* =============================================================
   WORKSPACES
   ============================================================= */
async function loadWorkspaces() {
  try {
    const data = await api('/workspaces');
    state.workspaces = data.workspaces || [];
    console.log('Loaded workspaces:', state.workspaces);
    
    if (state.workspaces.length === 0) {
      dom.workspaceSelect.innerHTML = '<option disabled selected>Create a workspace to begin</option>';
      dom.workspaceSelect.disabled = true;
      console.warn('No workspaces found. Create one via "+ Workspace" button.');
    } else {
      dom.workspaceSelect.disabled = false;
      dom.workspaceSelect.innerHTML = state.workspaces
        .map(w => `<option value="${escHtml(w.name)}">${escHtml(w.name)}</option>`)
        .join('');
      if (!state.workspace && state.workspaces.length > 0) {
        state.workspace = state.workspaces[0].name;
      }
      if (state.workspace) dom.workspaceSelect.value = state.workspace;
    }
  } catch (e) {
    console.error('loadWorkspaces failed:', e);
    dom.workspaceSelect.innerHTML = '<option disabled selected>Error loading workspaces</option>';
    dom.workspaceSelect.disabled = true;
  }
}

dom.workspaceSelect.addEventListener('change', async () => {
  state.workspace = dom.workspaceSelect.value;
  state.sessionId = null;
  state.sessionTokens = { query: 0, reply: 0 };
  updateTokenDisplay();
  await loadSessions();
  clearDrawer();
  dom.messages.innerHTML = '';
});

/* =============================================================
   SESSIONS
   ============================================================= */
async function loadSessions() {
  if (!state.workspace) return;
  try {
    const data = await api(`/sessions?workspace=${encodeURIComponent(state.workspace)}`);
    state.sessions = data.sessions || [];
    renderSessionList();
  } catch (e) {
    console.warn('loadSessions:', e);
  }
}

function renderSessionList() {
  dom.sessionList.innerHTML = '';
  if (state.sessions.length === 0) {
    dom.sessionList.innerHTML = '<div style="padding:12px;font-size:11px;color:var(--text-muted)">No sessions yet.</div>';
    return;
  }
  state.sessions.forEach(s => {
    const el = document.createElement('div');
    el.className = 'session-item' + (s.session_id === state.sessionId ? ' active' : '');
    el.dataset.sid = s.session_id;
    el.innerHTML = `
      <div class="session-item-row">
        <div class="session-item-title">${escHtml(s.title)}</div>
        <button class="btn-delete-session" title="Delete session">✕</button>
      </div>
      <div class="session-item-meta">${fmtDate(s.updated_at)}</div>
    `;
    el.querySelector('.session-item-title').addEventListener('click', () => loadSession(s.session_id));
    el.querySelector('.btn-delete-session').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm(`Delete session "${s.title}"?`)) return;
      try {
        await api(`/sessions/${s.session_id}`, { method: 'DELETE' });
        if (state.sessionId === s.session_id) {
          state.sessionId = null;
          dom.messages.innerHTML = '';
          clearDrawer();
          state.sessionTokens = { query: 0, reply: 0 };
          updateTokenDisplay();
        }
        await loadSessions();
      } catch (e) { alert('Delete failed: ' + e.message); }
    });
    // Parent click only fires when NOT clicking the title or delete button
    el.addEventListener('click', (e) => {
      if (e.target.closest('.btn-delete-session') || e.target.closest('.session-item-title')) return;
      loadSession(s.session_id);
    });
    dom.sessionList.appendChild(el);
  });
}

async function loadSession(sessionId) {
  state.sessionId = sessionId;
  state.sessionTokens = { query: 0, reply: 0 };
  tokenDatapoints.length = 0;
  dom.messages.innerHTML = '';
  clearDrawer();
  renderSessionList();
  try {
    const data = await api(`/sessions/${sessionId}/messages`);
    (data.messages || []).forEach(m => appendMessage(m.role, m.content, {
      time: m.created_at,
      toolCalls: m.tool_calls,
      thinking: m.thinking,
    }));
    const tok = await api(`/sessions/${sessionId}/tokens`);
    state.sessionTokens = { query: tok.token_query, reply: tok.token_reply };
    // Seed sparkline with one historical point so it shows something on reload
    if ((tok.token_query + tok.token_reply) > 0) {
      tokenDatapoints.push({ t: Date.now(), cumulative: tok.token_query + tok.token_reply });
    }
    updateTokenDisplay();
    scrollBottom();
  } catch (e) {
    console.warn('loadSession:', e);
  }
}

async function newChat() {
  if (!state.workspace) return;
  try {
    const s = await api('/sessions', { method: 'POST', body: JSON.stringify({ workspace: state.workspace }) });
    state.sessionId = s.session_id;
    state.sessionTokens = { query: 0, reply: 0 };
    tokenDatapoints.length = 0;
    dom.messages.innerHTML = '';
    clearDrawer();
    updateTokenDisplay();
    await loadSessions();
    renderSessionList();
  } catch (e) {
    console.warn('newChat:', e);
  }
}

$('btn-new-chat').addEventListener('click', newChat);

/* =============================================================
   MESSAGES
   ============================================================= */
function appendMessage(role, content, opts = {}) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble' + (opts.error ? ' error-bubble' : '');

  if (role === 'assistant' && !opts.error) {
    bubble.innerHTML = renderMarkdown(content);
  } else {
    bubble.textContent = content;
  }

  el.appendChild(bubble);

  if (opts.time) {
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = fmtTime(opts.time);
    el.appendChild(meta);
  }

  dom.messages.appendChild(el);
  scrollBottom();
  return el;
}

function appendTypingIndicator() {
  const el = document.createElement('div');
  el.className = 'msg assistant';
  el.id = 'typing-indicator';
  el.innerHTML = '<div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  dom.messages.appendChild(el);
  scrollBottom();
  return el;
}

/* =============================================================
   DRAWER
   ============================================================= */
function clearDrawer() {
  dom.drawerContent.innerHTML = '';
  dom.drawerContent.appendChild(dom.drawerEmpty);
  dom.drawerEmpty.style.display = 'flex';
  state.activeToolCards = {};
}

function addThinkingCard(text) {
  dom.drawerEmpty.style.display = 'none';
  const card = document.createElement('div');
  card.className = 'thinking-card';  // collapsed by default
  card.innerHTML = `
    <div class="thinking-card-header">
      <span class="thinking-icon">&#x1F9E0;</span>
      <span>Thinking</span>
      <span style="margin-left:auto;font-size:10px;color:var(--text-muted)">&#x25BC;</span>
    </div>
    <div class="thinking-card-body">
      <div class="thinking-text">${escHtml(text)}</div>
    </div>
  `;
  card.querySelector('.thinking-card-header').addEventListener('click', () => card.classList.toggle('open'));
  dom.drawerContent.appendChild(card);  // append at bottom
}

function addToolStartCard(tool, input, callId) {
  dom.drawerEmpty.style.display = 'none';
  const color = toolColor(tool);
  const card = document.createElement('div');
  card.className = 'tool-card';  // collapsed by default
  card.dataset.callId = callId;
  card.innerHTML = `
    <div class="tool-card-header">
      <span class="tool-dot ${color}"></span>
      <span class="tool-name">${escHtml(tool)}</span>
      <span class="tool-spinner"></span>
    </div>
    <div class="tool-card-body">
      <div class="tool-section-label">Input</div>
      <div class="tool-json">${escHtml(JSON.stringify(input, null, 2))}</div>
    </div>
  `;
  card.querySelector('.tool-card-header').addEventListener('click', () => card.classList.toggle('open'));
  dom.drawerContent.appendChild(card);  // append at bottom
  dom.drawerContent.scrollTop = dom.drawerContent.scrollHeight;
  state.activeToolCards[callId] = card;
}

function updateToolEndCard(tool, output, durationMs, callId) {
  const card = state.activeToolCards[callId];
  if (!card) return;
  const header = card.querySelector('.tool-card-header');
  const spinner = header.querySelector('.tool-spinner');
  if (spinner) {
    const dur = document.createElement('span');
    dur.className = 'tool-duration';
    dur.textContent = `${durationMs}ms`;
    header.replaceChild(dur, spinner);
  }
  const body = card.querySelector('.tool-card-body');
  const outSection = document.createElement('div');
  outSection.innerHTML = `
    <div class="tool-section-label">Output</div>
    <div class="tool-json">${escHtml(output)}</div>
  `;
  body.appendChild(outSection);
}

/* =============================================================
   SOURCE EXTRACTION & LINK HANDLING
   ============================================================= */

/**
 * Open a URL in the system default app.
 * In pywebview, window.open() opens the OS browser/file handler.
 */
function openExternalUrl(url) {
  try {
    if (window.pywebview && window.pywebview.api && window.pywebview.api.open_url) {
      window.pywebview.api.open_url(url);
    } else {
      window.open(url, '_blank');
    }
  } catch { window.open(url, '_blank'); }
}

// Global click handler to intercept all <a> clicks inside the messages area
document.addEventListener('click', e => {
  const a = e.target.closest('a');
  if (!a) return;
  const href = a.getAttribute('href');
  if (!href) return;
  // Only intercept http/https and local file URLs
  if (href.startsWith('http://') || href.startsWith('https://') || href.startsWith('file://')) {
    e.preventDefault();
    openExternalUrl(href);
  }
});

/* =============================================================
   TOKEN SPARKLINE
   ============================================================= */
const tokenDatapoints = [];  // {t: timestamp_ms, cumulative: N, event: 'query'|'reply'}

function drawSparkline() {
  const canvas = $('token-sparkline');
  if (!canvas) return;
  const pts = tokenDatapoints;
  if (pts.length < 2) { canvas.style.display = 'none'; return; }
  canvas.style.display = 'inline-block';
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const vals = pts.map(p => p.cumulative);
  const minV = 0;
  const maxV = Math.max(...vals) || 1;

  // Draw filled area under the line
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  ctx.beginPath();
  pts.forEach((p, i) => {
    const x = (i / (pts.length - 1)) * W;
    const y = H - ((p.cumulative - minV) / (maxV - minV)) * (H - 2) - 1;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = accent || '#5b7df8';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Fill below
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle = (accent || '#5b7df8') + '33';
  ctx.fill();
}

/* =============================================================
   TOKEN DISPLAY
   ============================================================= */
function updateTokenDisplay(tq, tr) {
  if (tq !== undefined) {
    state.sessionTokens.query += tq;
    state.sessionTokens.reply += tr;
    tokenDatapoints.push({
      t: Date.now(),
      cumulative: state.sessionTokens.query + state.sessionTokens.reply,
    });
    if (tokenDatapoints.length > 200) tokenDatapoints.splice(0, tokenDatapoints.length - 200);
  }
  const total = state.sessionTokens.query + state.sessionTokens.reply;
  if (total === 0) {
    dom.tokenLabel.textContent = 'Session: 0 tokens';
    dom.tokenBar.style.width = '0%';
    return;
  }
  // Show cumulative session tokens (query + reply)
  const fmt = n => n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
  dom.tokenLabel.textContent = `Session: ${fmt(total)} tokens (${fmt(state.sessionTokens.query)}\u2191 ${fmt(state.sessionTokens.reply)}\u2193)`;
  drawSparkline();
  // Keep the hidden bar updated for the color coding logic
  const limit = getModelContextLimit(state.model);
  const pct   = limit > 0 ? Math.min((total / limit) * 100, 100) : Math.min((total / 100000) * 100, 100);
  dom.tokenBar.style.width = pct + '%';
  dom.tokenBar.style.background =
    pct > 80 ? 'var(--red)' : pct > 60 ? 'var(--amber)' : 'var(--accent)';
}

/* =============================================================
   QUERY + SSE STREAM
   ============================================================= */
async function sendQuery() {
  const question = dom.queryInput.value.trim();
  if (!question || state.streaming) return;

  if (!state.sessionId) await newChat();
  if (!state.sessionId) return;

  state.queryHistory.unshift(question);
  if (state.queryHistory.length > 50) state.queryHistory.pop();
  state.historyIndex = -1;

  dom.queryInput.value = '';
  autoResizeTextarea();
  appendMessage('user', question, { time: new Date().toISOString() });

  if (!dom.toolDrawer.classList.contains('collapsed') || state.drawerPinned) {
    clearDrawer();
  } else {
    dom.toolDrawer.classList.remove('collapsed');
    clearDrawer();
  }

  const typingEl = appendTypingIndicator();
  state.streaming = true;
  dom.btnSend.disabled = true;
  dom.agentMsg.textContent = '⚙ Running…';

  let assembledText = '';

  try {
    const res = await fetch(API + '/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: state.sessionId,
        question,
        workspace: state.workspace,
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || res.statusText);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      let eventType = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ') && eventType) {
          try {
            const data = JSON.parse(line.slice(6));
            handleSSEEvent(eventType, data);
            if (eventType === 'text_chunk') assembledText += data.text || '';
          } catch { /* malformed JSON, skip */ }
          eventType = null;
        }
      }
    }

  } catch (e) {
    typingEl.remove();
    appendMessage('assistant', `⚠ Error: ${e.message}`, { error: true, time: new Date().toISOString() });
    dom.agentMsg.textContent = 'Error';
    state.streaming = false;
    dom.btnSend.disabled = false;
    return;
  }

  // Convert the typing indicator into the final message bubble in-place
  // (avoids a duplicate render: the indicator already has the streamed text)
  const typingBubble = typingEl ? typingEl.querySelector('.msg-bubble') : null;
  if (typingBubble && assembledText) {
    typingBubble.innerHTML = renderMarkdown(assembledText);
    // Add timestamp
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = fmtTime(new Date().toISOString());
    typingEl.appendChild(meta);
    // Remove the id so it's no longer the typing indicator
    typingEl.removeAttribute('id');
  } else if (typingEl) {
    typingEl.remove();
    if (assembledText) {
      appendMessage('assistant', assembledText, { time: new Date().toISOString() });
    }
  }

  dom.agentMsg.textContent = 'Ready';
  state.streaming = false;
  dom.btnSend.disabled = false;
  loadSessions();
}

function handleSSEEvent(type, data) {
  switch (type) {
    case 'thinking':
      addThinkingCard(data.text);
      break;
    case 'tool_start':
      addToolStartCard(data.tool, data.input, data.call_id);
      dom.agentMsg.textContent = `🔧 ${data.tool}`;
      break;
    case 'tool_end':
      updateToolEndCard(data.tool, data.output, data.duration_ms, data.call_id);
      break;
    case 'text_chunk': {
      const typing = $('typing-indicator');
      if (typing) {
        const bubble = typing.querySelector('.msg-bubble');
        if (bubble) {
          if (bubble.querySelector('.typing-dots')) bubble.innerHTML = '';
          bubble.dataset.partial = (bubble.dataset.partial || '') + data.text;
          bubble.innerHTML = renderMarkdown(bubble.dataset.partial);
          scrollBottom();
        }
      }
      dom.agentMsg.textContent = '✍ Writing…';
      break;
    }
    case 'token_update': {
      // Show live running totals for the current query without committing to session yet.
      // We temporarily add the current-query tokens on top of the previous session total.
      const prevTotal = state.sessionTokens.query + state.sessionTokens.reply;
      const liveTotal = prevTotal + data.token_query + data.token_reply;
      const fmt = n => n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
      dom.tokenLabel.textContent = `Session: ${fmt(liveTotal)} tokens (${fmt(state.sessionTokens.query + data.token_query)}\u2191 ${fmt(state.sessionTokens.reply + data.token_reply)}\u2193)`;
      const limit = getModelContextLimit(state.model);
      const pct   = limit > 0 ? Math.min((liveTotal / limit) * 100, 100) : Math.min((liveTotal / 100000) * 100, 100);
      dom.tokenBar.style.width = pct + '%';
      dom.tokenBar.style.background =
        pct > 80 ? 'var(--red)' : pct > 60 ? 'var(--amber)' : 'var(--accent)';
      break;
    }
    case 'done':
      updateTokenDisplay(data.token_query, data.token_reply);
      dom.agentMsg.textContent = 'Ready';
      break;
    case 'error': {
      const typingEl = $('typing-indicator');
      if (typingEl) typingEl.remove();
      appendMessage('assistant', `⚠ ${data.message}`, { error: true, time: new Date().toISOString() });
      break;
    }
  }
}

/* =============================================================
   INPUT EVENTS
   ============================================================= */
dom.btnSend.addEventListener('click', sendQuery);

dom.queryInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.ctrlKey && !e.shiftKey) {
    e.preventDefault(); sendQuery(); return;
  }
  if (e.key === 'Enter' && e.ctrlKey) {
    // Insert newline
    e.preventDefault();
    const ta = dom.queryInput;
    const start = ta.selectionStart;
    const end   = ta.selectionEnd;
    ta.value = ta.value.slice(0, start) + '\n' + ta.value.slice(end);
    ta.selectionStart = ta.selectionEnd = start + 1;
    autoResizeTextarea();
    return;
  }
  if (e.key === 'ArrowUp' && dom.queryInput.value === '') {
    e.preventDefault();
    state.historyIndex = Math.min(state.historyIndex + 1, state.queryHistory.length - 1);
    if (state.historyIndex >= 0) dom.queryInput.value = state.queryHistory[state.historyIndex];
    autoResizeTextarea(); return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    state.historyIndex = Math.max(state.historyIndex - 1, -1);
    dom.queryInput.value = state.historyIndex >= 0 ? state.queryHistory[state.historyIndex] : '';
    autoResizeTextarea(); return;
  }
});
dom.queryInput.addEventListener('input', autoResizeTextarea);

/* =============================================================
   PROVIDER / MODEL CONFIG
   ============================================================= */
async function loadConfig() {
  try {
    const cfg = await api('/config');
    if (cfg['global.provider']) { state.provider = cfg['global.provider']; dom.providerSelect.value = state.provider; }
    if (cfg['global.model'])    { state.model    = cfg['global.model']; }
    if (cfg['global.theme'] === 'light') {
      document.documentElement.classList.add('light');
      $('icon-moon').style.display = 'none';

/* =============================================================
   INGEST — live progress in status bar + toast
   ============================================================= */
let _ingestPollTimer = null;

function _startIngestPoll(workspace, force) {
  if (_ingestPollTimer) clearInterval(_ingestPollTimer);

  const statusEl = $('ingest-status');
  const toast    = $('ingest-toast');
  const toastMsg = $('ingest-toast-msg');

  // Show both indicators immediately
  toast.classList.remove('hidden');
  toastMsg.textContent = force
    ? `Force re-ingesting "${workspace}"…`
    : `Ingesting "${workspace}" (changed files)…`;
  statusEl.className = 'running';
  statusEl.style.display = '';
  statusEl.innerHTML = '<span class="ingest-spinner"></span> Starting…';

  _ingestPollTimer = setInterval(async () => {
    try {
      const data = await api('/ingest/status');
      const ws = (data.workspaces || []).find(w => w.workspace === workspace);
      if (!ws) return;

      const { status, processed, total, indexed, skipped, failed, elapsed_s, error } = ws;

      if (status === 'running') {
        const pct   = total > 0 ? Math.round((processed / total) * 100) : 0;
        const label = total > 0 ? `${processed} / ${total} files (${pct}%)` : 'Scanning…';
        statusEl.innerHTML = `<span class="ingest-spinner"></span> Indexing: ${label}`;
        toastMsg.textContent = total > 0
          ? `${force ? 'Force ingest' : 'Ingest'}: ${processed}/${total} files (${pct}%) — ${ws.elapsed_fmt || elapsed_s + 's'}`
          : `${force ? 'Force ingest' : 'Ingest'}: scanning files…`;

      } else if (status === 'done') {
        clearInterval(_ingestPollTimer); _ingestPollTimer = null;
        const summary = `${total} files → ${indexed} chunks${failed > 0 ? `, ${failed} failed` : ''} — ${ws.elapsed_fmt || elapsed_s + 's'}`;
        statusEl.className = 'done';
        statusEl.innerHTML = `✓ ${summary}`;
        toastMsg.textContent = `✓ ${force ? 'Force ingest' : 'Ingest'} complete: ${summary}`;
        setTimeout(() => toast.classList.add('hidden'), 4000);
        setTimeout(() => { statusEl.style.display = 'none'; statusEl.className = ''; }, 8000);

      } else if (status === 'error') {
        clearInterval(_ingestPollTimer); _ingestPollTimer = null;
        statusEl.className = 'error';
        statusEl.innerHTML = `✗ Error: ${error || 'unknown'}`;
        toastMsg.textContent = `✗ Ingest failed: ${error || 'unknown'}`;
        setTimeout(() => toast.classList.add('hidden'), 6000);
        setTimeout(() => { statusEl.style.display = 'none'; statusEl.className = ''; }, 12000);
      }
    } catch (e) { console.warn('ingest poll:', e); }
  }, 1000);
}

async function triggerIngest(force = false) {
  if (!state.workspace) return;
  try {
    await api('/ingest', { method: 'POST', body: JSON.stringify({ workspace: state.workspace, force }) });

    $('ingest-toast').classList.remove('hidden');
    $('ingest-toast-msg').textContent = '✗ Ingest failed: ' + e.message;
    setTimeout(() => $('ingest-toast').classList.add('hidden'), 4000);
  }
}

async function openSettings(tab) {
  // Reset to first tab unless a specific one is requested
  const targetTab = tab || 'keys';
  document.querySelectorAll('#modal-settings .settings-tab').forEach(t => {
    const isTarget = t.dataset.tab === targetTab;
    t.classList.toggle('active', isTarget);
  });
  document.querySelectorAll('#modal-settings .settings-pane').forEach(p => p.classList.add('hidden'));
  const targetPane = $('settings-pane-' + targetTab);
  if (targetPane) targetPane.classList.remove('hidden');

  // --- Tab 1: API Keys ---
  ['google', 'openai', 'anthropic'].forEach(p => {
    $('key-input-' + p).value = '';
    setKeyStatus(p, '');
  });
  try {
    const data = await api('/keys');
    const keys = data.keys || {};
    ['google', 'openai', 'anthropic'].forEach(provider => {
      if (keys[provider]) {
        setKeyStatus(provider, '\u2713 Key saved: ' + keys[provider], 'ok');
        $('key-btn-delete-' + provider).classList.remove('hidden');
      } else {
        $('key-btn-delete-' + provider).classList.add('hidden');
      }
    });
  } catch (e) { console.warn('Could not load keys:', e); }

  try {
    const ls = await api('/langsmith');
    if (ls.configured) {
      setKeyStatus('langsmith', '\u2713 Configured: ' + ls.api_key_masked + (ls.project ? ' / ' + ls.project : ''), 'ok');
      $('btn-langsmith-delete').classList.remove('hidden');
      $('langsmith-project').value = ls.project || '';
    } else {
      $('btn-langsmith-delete').classList.add('hidden');
    }
  } catch (e) { console.warn('Could not load LangSmith config:', e); }

  // --- Tab 2: Semantic ---
  try {
    const s = await api('/settings/semantic');
    $('toggle-enable-semantic').checked        = !!s.enable_semantic;
    $('toggle-enable-query-expansion').checked = !!s.enable_query_expansion;
    const semProvider = s.semantic_provider || '';
    $('sem-provider-select').value = semProvider;
    _populateSemModelDropdown(semProvider, s.semantic_model || '');
  } catch (e) { console.warn('Could not load semantic settings:', e); }

  // --- Tab 3: Models ---
  await loadModels();
  renderModelList(_allModels);

  // --- Tab 4: Advanced ---
  await loadAdvancedSettings();

  $('modal-settings').classList.remove('hidden');
}

function repopulateModelDropdown(provider) {
  const sel = dom.modelInput;
  const models = _allModels[provider] || [];
  const current = state.model;
  sel.innerHTML = models.map(m =>
    `<option value="${escHtml(m)}"${m === current ? ' selected' : ''}>${escHtml(m)}</option>`
  ).join('');
  if (models.length === 0) {
    sel.innerHTML = '<option value="" disabled selected>No models \u2014 add via Settings</option>';
  } else if (!models.includes(current)) {
    state.model = models[0];
    sel.value = models[0];
    api('/config', { method: 'PATCH', body: JSON.stringify({ key: 'global.model', value: models[0] }) })
      .catch(e => console.warn('Could not persist model change:', e));
  }
}

dom.providerSelect.addEventListener('change', async () => {
  state.provider = dom.providerSelect.value;
  repopulateModelDropdown(state.provider);
  await api('/config', { method: 'PATCH', body: JSON.stringify({ key: 'global.provider', value: state.provider }) });
});

dom.modelInput.addEventListener('change', async () => {
  state.model = dom.modelInput.value;
  if (state.model) {
    await api('/config', { method: 'PATCH', body: JSON.stringify({ key: 'global.model', value: state.model }) });
    updateTokenDisplay();
  }
});

/* =============================================================
   MODEL MANAGER
   ============================================================= */
function renderModelList(models) {
  const container = $('model-list-container');
  container.innerHTML = '';
  const providers = ['google', 'openai', 'anthropic', 'ollama'];
  providers.forEach(provider => {
    const list = models[provider] || [];
    const group = document.createElement('div');
    group.className = 'model-provider-group';
    group.innerHTML = `<div class="model-provider-header">${provider}</div>`;
    if (list.length === 0) {
      group.innerHTML += '<div class="model-item" style="color:var(--text-muted)">No models added</div>';
    } else {
      list.forEach(model => {
        const item = document.createElement('div');
        item.className = 'model-item';
        item.innerHTML = `
          <span class="model-item-name">${escHtml(model)}</span>
          <button class="model-item-delete" data-provider="${escHtml(provider)}" data-model="${escHtml(model)}">Remove</button>
        `;
        group.appendChild(item);
      });
    }
    container.appendChild(group);
  });
  container.querySelectorAll('.model-item-delete').forEach(btn => {
    btn.addEventListener('click', async () => {
      const provider = btn.dataset.provider;
      const model = btn.dataset.model;
      if (!confirm(`Remove "${model}" from ${provider}?`)) return;
      try {
        const data = await api('/models', {
          method: 'DELETE',
          body: JSON.stringify({ provider, model_name: model }),
        });
        _allModels = data.models || _allModels;
        renderModelList(_allModels);
        repopulateModelDropdown(state.provider);
      } catch (e) {
        $('model-mgr-status').textContent = '\u2717 ' + (e.message || 'Failed');
        $('model-mgr-status').className = 'key-status err';
      }
    });
  });
}

$('btn-model-add').addEventListener('click', async () => {
  const provider = $('model-mgr-provider').value;
  const name = $('model-mgr-name').value.trim();
  if (!name) { $('model-mgr-status').textContent = 'Enter a model name.'; $('model-mgr-status').className = 'key-status err'; return; }
  try {
    const data = await api('/models', {
      method: 'POST',
      body: JSON.stringify({ provider, model_name: name }),
    });
    _allModels = data.models || _allModels;
    $('model-mgr-name').value = '';
    renderModelList(_allModels);
    repopulateModelDropdown(state.provider);
    $('model-mgr-status').textContent = '\u2713 Added';
    $('model-mgr-status').className = 'key-status ok';
    setTimeout(() => { $('model-mgr-status').textContent = ''; $('model-mgr-status').className = 'key-status'; }, 2000);
  } catch (e) {
    $('model-mgr-status').textContent = '\u2717 ' + (e.message || 'Failed');
    $('model-mgr-status').className = 'key-status err';
  }
});

/* =============================================================
   BOOT
   ============================================================= */
window.addEventListener('resize', () => {
  const app = document.getElementById('app');
  if (app) app.style.height = window.innerHeight + 'px';
});
document.addEventListener('DOMContentLoaded', () => {
  const app = document.getElementById('app');
  if (app) app.style.height = window.innerHeight + 'px';
});

async function boot() {
  console.log('\ud83d\ude80 Booting Local Search Agent UI...');
  await loadConfig();
  console.log('\u2713 Config loaded');
  await loadModels();
  console.log('\u2713 Models loaded');
  dom.providerSelect.value = state.provider;
  await loadWorkspaces();
  console.log('\u2713 Workspaces loaded:', state.workspaces.length, 'workspaces');
  if (state.workspace) {
    console.log('\ud83d\udcc2 Active workspace:', state.workspace);
    await loadSessions();
    if (state.sessions.length > 0) {
      await loadSession(state.sessions[0].session_id);
    } else {
      await newChat();
    }
  } else {
    console.warn('\u26a0\ufe0f  No workspace selected. Create one to start.');
  }
  updateTokenDisplay();
  console.log('\ud83d\udd0d Starting health checks...');
  pollHealth();
  setInterval(pollHealth, 15000);
  console.log('\u2705 Boot complete');
}

boot().catch(e => console.error('Boot error:', e));
</script>
