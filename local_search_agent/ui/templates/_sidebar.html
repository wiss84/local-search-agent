<!-- ═══════════════════════════════════════════════════════
     LEFT PANEL  —  controls + session history
     ═══════════════════════════════════════════════════════ -->
<aside id="left-panel">

  <!-- ── Workspace ── -->
  <div class="lp-section">
    <div class="lp-label">Workspace</div>
    <div style="display:flex;gap:6px;align-items:center">
      <select id="workspace-select" class="lp-select" style="flex:1;min-width:0"></select>
      <button id="btn-delete-workspace" class="lp-btn-icon-danger" title="Delete workspace" data-requires-superadmin="true">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="2,4 14,4"/><path d="M5,4V2h6v2"/><path d="M3,4l1,10h8l1-10"/></svg>
      </button>
    </div>
    <button id="btn-new-workspace" class="lp-btn-ghost" data-requires-superadmin="true">+ New Workspace</button>
  </div>

  <div class="lp-divider"></div>

  <!-- ── Provider & Model ── -->
  <div class="lp-section">
    <div class="lp-label">Provider</div>
    <!-- Model/Provider Access Control (Option B): this is now a PERSONAL,
         per-query choice, not admin-only. In multi-tenant mode it's
         populated from /models/allowed (filtered to the caller's current
         role) and sent as an explicit provider/model_name override on
         every query -- it no longer PATCHes the shared /api/ui/config
         default (see _script_models_boot.html). Any role may use it;
         the actual model that runs is still re-verified server-side
         against the same allow-list regardless of what this dropdown
         shows, so there is no new trust boundary here. Single-user mode
         (no identity_provider) keeps today's exact behavior: PATCHes the
         shared config, no allow-list, no role concept at all. -->
    <select id="provider-select" class="lp-select">
      <option value="google">Google</option>
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
      <option value="ollama">Ollama</option>
    </select>
    <div class="lp-label" style="margin-top:8px">Model</div>
    <select id="model-input" class="lp-select"></select>
  </div>

  <div class="lp-divider"></div>

  <!-- ── Ingestion ── -->
  <div class="lp-section">
    <div class="lp-label">Ingestion</div>
    <button class="lp-btn" id="btn-ingest" title="Re-ingest changed files only" data-requires-role="admin">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,8 1,14 15,14 15,8"/><polyline points="5,4 8,1 11,4"/><line x1="8" y1="1" x2="8" y2="10"/></svg>
      Ingest
    </button>
    <button class="lp-btn lp-btn-warning" id="btn-force-ingest" title="Force re-ingest all files (ignores modification time)" data-requires-superadmin="true">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13.5 2.5a6.5 6.5 0 1 1-9.19.35"/><polyline points="1,1 1,5 5,5"/></svg>
      Force Re-ingest
    </button>
    <button class="lp-btn lp-btn-danger" id="btn-wipe-ingest" title="Wipe index and re-ingest from scratch" data-requires-superadmin="true">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="2,4 14,4"/><path d="M5,4V2h6v2"/><path d="M3,4l1,10h8l1-10"/></svg>
      Wipe &amp; Re-ingest
    </button>
  </div>

  <div class="lp-divider"></div>

  <!-- ── Tools ── -->
  <div class="lp-section">
    <div class="lp-label">Tools</div>
    <div class="lp-sync-row">
      <button class="lp-btn" id="btn-scheduler" title="Configure ingestion sync (Watch Mode or Scheduler)" style="flex:1" data-requires-role="admin">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><polyline points="8,4 8,8 11,10"/></svg>
        Sync
      </button>
      <label class="toggle-switch lp-sync-toggle" title="Turn automatic sync on or off">
        <input type="checkbox" id="toggle-sync-enabled">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div id="sync-status-hint" class="lp-sync-hint">Auto-sync is off</div>
    <div class="export-row">
      <button class="lp-btn lp-btn-accent" id="btn-export" title="Export conversation" style="flex:1">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V6z"/><polyline points="9,1 9,6 14,6"/></svg>
        Export Chat
      </button>
      <button class="lp-btn-icon" id="btn-print-chat" title="Print conversation">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 7V2h8v5"/><rect x="2" y="7" width="12" height="6" rx="1"/><path d="M4 13v2h8v-2"/></svg>
      </button>
    </div>
    <div id="export-menu" class="export-menu hidden">
      <button data-format="md">Markdown (.md)</button>
      <button data-format="docx">Word (.docx)</button>
    </div>
  </div>

  <div class="lp-divider"></div>

  <!-- ── Session History ── -->
  <div class="lp-section lp-section-sessions">
    <div class="lp-sessions-header">
      <span class="lp-label" style="margin:0">History</span>
      <button id="btn-new-chat" class="lp-btn-ghost lp-btn-xs">+ New</button>
    </div>
    <div id="session-list"></div>
  </div>

</aside>
