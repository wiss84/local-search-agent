<style>
/* =========================================================
   DESIGN TOKENS
   ========================================================= */
:root {
  --bg-base:       #0f1117;
  --bg-surface:    #1a1d27;
  --bg-raised:     #22263a;
  --bg-hover:      #2a2f45;
  --bg-active:     #313754;
  --border:        #2e3352;
  --border-light:  #3d4468;
  --text-primary:  #e2e6f0;
  --text-secondary:#8892b0;
  --text-muted:    #525c7a;
  --accent:        #5b7df8;
  --accent-hover:  #7090ff;
  --accent-dim:    rgba(91,125,248,0.15);
  --green:         #3dd68c;
  --green-dim:     rgba(61,214,140,0.12);
  --amber:         #f5a623;
  --amber-dim:     rgba(245,166,35,0.12);
  --red:           #f06292;
  --red-dim:       rgba(240,98,146,0.12);
  --blue-dim:      rgba(91,125,248,0.12);
  --tool-search:   #5b7df8;
  --tool-fetch:    #3dd68c;
  --tool-graph:    #f5a623;
  --radius:        8px;
  --radius-lg:     12px;
  --font-mono:     'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  --transition:    0.15s ease;
  --drawer-width:  320px;
  --topbar-h:      48px;
  --statusbar-h:   36px;
  --left-panel-w:  220px;
}

/* =========================================================
   RESET + BASE
   ========================================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg-base); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 1.6; }
button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; }
input, select { font: inherit; color: inherit; background: none; border: none; outline: none; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* =========================================================
   LAYOUT
   ========================================================= */
#app {
  display: grid;
  grid-template-rows: var(--topbar-h) 1fr var(--statusbar-h);
  grid-template-columns: 1fr;
  height: 100vh;
}
#topbar {
  grid-row: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
  overflow-x: auto;
  overflow-y: hidden;
}
#main {
  grid-row: 2;
  display: flex;
  overflow: hidden;
  position: relative;
}
#statusbar {
  grid-row: 3;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 16px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
}

/* =========================================================
   TOPBAR  —  logo + toggles only
   ========================================================= */
#topbar {
  grid-row: 1;
  display: flex;
  align-items: center;
  padding: 0 16px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
#logo { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; white-space: nowrap; }
#logo span { color: var(--accent); }
.tb-btn { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-raised); color: var(--text-secondary); font-size: 12px; transition: var(--transition); white-space: nowrap; }
.tb-btn:hover { border-color: var(--border-light); color: var(--text-primary); background: var(--bg-hover); }
.tb-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
#btn-theme svg { width: 14px; height: 14px; }

/* =========================================================
   LEFT PANEL
   ========================================================= */
#left-panel {
  width: var(--left-panel-w);
  flex-shrink: 0;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.lp-section {
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.lp-section-sessions {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 0;
  padding-bottom: 0;
}
.lp-sessions-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
  padding: 0 2px;
}
.lp-divider { height: 1px; background: var(--border); flex-shrink: 0; }
.lp-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-muted);
  margin-bottom: 2px;
}
.lp-select {
  width: 100%;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 8px;
  color: var(--text-primary);
  font-size: 12px;
}
.lp-select:focus { outline: none; border-color: var(--accent); }
.lp-input {
  width: 100%;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 8px;
  color: var(--text-primary);
  font-size: 12px;
  font-family: inherit;
}
.lp-input:focus { outline: none; border-color: var(--accent); }
.lp-input::placeholder { color: var(--text-muted); }
.lp-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  padding: 6px 10px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-secondary);
  font-size: 12px;
  transition: var(--transition);
  cursor: pointer;
  text-align: left;
}
.lp-btn:hover { border-color: var(--border-light); color: var(--text-primary); background: var(--bg-hover); }
.lp-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
.lp-btn-warning { border-color: var(--amber); color: var(--amber); }
.lp-btn-warning:hover { background: var(--amber-dim) !important; border-color: var(--amber) !important; color: var(--amber) !important; }
.lp-btn-danger  { border-color: var(--red); color: var(--red); }
.lp-btn-danger:hover  { background: var(--red-dim)   !important; border-color: var(--red)   !important; color: var(--red)   !important; }
.lp-btn-accent  { border-color: var(--accent); color: var(--accent); }
.lp-btn-accent:hover  { background: var(--accent-dim) !important; border-color: var(--accent) !important; color: var(--accent) !important; }
.lp-btn-ghost {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 11px;
  padding: 2px 4px;
  border-radius: 4px;
  cursor: pointer;
  transition: var(--transition);
}
.lp-btn-ghost:hover { color: var(--accent); background: var(--accent-dim); }
.lp-btn-xs { font-size: 10px; padding: 1px 5px; }

.lp-sync-row { display: flex; align-items: center; gap: 8px; }
.lp-sync-toggle { width: 28px; height: 16px; margin-top: 0; flex-shrink: 0; }
.lp-sync-toggle .toggle-slider::before { width: 11px; height: 11px; left: 2px; top: 2px; }
.lp-sync-toggle input:checked + .toggle-slider::before { transform: translateX(12px); }
.lp-sync-hint { font-size: 10px; color: var(--text-muted); padding: 0 2px; }
.lp-sync-hint.on { color: var(--green); }

/* Document Preview Panel */
.preview-panel {
  position: fixed;
  top: var(--topbar-h);
  right: 0;
  width: 420px;
  max-width: 100vw;
  height: calc(100vh - var(--topbar-h) - var(--statusbar-h));
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 200;
  box-shadow: -4px 0 24px rgba(0,0,0,.18);
  transition: transform .22s cubic-bezier(.4,0,.2,1);
}
.preview-panel.hidden { transform: translateX(105%); }
.preview-header {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.preview-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.preview-meta {
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
}
.preview-close {
  display: flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--text-muted);
  padding: 3px 8px;
  font-size: 11px;
  flex-shrink: 0;
  transition: var(--transition);
}
.preview-close svg { width: 9px; height: 9px; }
.preview-close:hover { color: var(--text-primary); border-color: var(--border-light); background: var(--bg-hover); }
.preview-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-primary);
  word-break: break-word;
}
/* Markdown styling for preview body */
.preview-body h1,.preview-body h2,.preview-body h3,.preview-body h4 { margin: 14px 0 6px; font-weight: 600; color: var(--text-primary); }
.preview-body h1 { font-size: 18px; } .preview-body h2 { font-size: 16px; } .preview-body h3 { font-size: 14px; }
.preview-body p { margin: 6px 0; }
.preview-body ul,.preview-body ol { padding-left: 20px; margin: 6px 0; }
.preview-body li { margin: 3px 0; }
.preview-body code { font-family: var(--font-mono); font-size: 11px; background: var(--bg-raised); padding: 1px 5px; border-radius: 3px; color: var(--accent-hover); }
.preview-body pre { margin: 8px 0; }
.preview-body pre code { display: block; padding: 12px; border-radius: var(--radius); overflow-x: auto; font-size: 11px; background: var(--bg-base); border: 1px solid var(--border); color: var(--text-primary); }
.preview-body table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
.preview-body th, .preview-body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
.preview-body th { background: var(--bg-raised); font-weight: 600; }
.preview-body a { color: var(--accent); }
.preview-body blockquote { border-left: 3px solid var(--accent-dim); margin: 6px 0; padding: 4px 12px; color: var(--text-secondary); }
.preview-body strong { color: var(--text-primary); }
.preview-body mark {
  background: rgba(253,224,71,.55);
  border-radius: 2px;
  padding: 0 1px;
}
.preview-loading { color: var(--text-muted); font-size: 12px; }
.preview-footer {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

/* =========================================================
   SESSION LIST  (inside left panel)
   ========================================================= */
#session-list { flex: 1; overflow-y: auto; padding: 4px 4px 8px; }
.session-item { padding: 6px 8px; border-radius: var(--radius); cursor: pointer; transition: var(--transition); border: 1px solid transparent; margin-bottom: 2px; }
.session-item:hover { background: var(--bg-raised); }
.session-item.active { background: var(--bg-raised); border-color: var(--border); }
.session-item-title { font-size: 11px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.session-item-meta { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
.session-item-row { display: flex; align-items: center; gap: 4px; }
.btn-delete-session { padding: 1px 4px; border-radius: 3px; font-size: 10px; color: var(--text-muted); border: 1px solid transparent; flex-shrink: 0; opacity: 0; transition: opacity var(--transition), color var(--transition); background: none; cursor: pointer; }
.session-item:hover .btn-delete-session { opacity: 1; }
.btn-delete-session:hover { color: var(--red); border-color: var(--red); background: var(--red-dim); }

/* =========================================================
   TOOL DRAWER
   ========================================================= */
#tool-drawer { width: var(--drawer-width); background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: width var(--transition); overflow: hidden; }
#tool-drawer.collapsed { width: 0; }
#drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#drawer-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
#btn-pin-drawer { padding: 2px 6px; border-radius: 4px; font-size: 10px; color: var(--text-muted); border: 1px solid var(--border); transition: var(--transition); }
#btn-pin-drawer:hover, #btn-pin-drawer.pinned { color: var(--accent); border-color: var(--accent); }
#drawer-content { flex: 1; overflow-y: auto; padding: 8px; }
#drawer-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 12px; text-align: center; padding: 24px; }
.tool-card { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; animation: slideIn 0.15s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.tool-card-header { display: flex; align-items: center; gap: 8px; padding: 7px 10px; cursor: pointer; transition: var(--transition); user-select: none; }
.tool-card-header:hover { background: var(--bg-hover); }
.tool-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tool-dot.search { background: var(--tool-search); }
.tool-dot.fetch  { background: var(--tool-fetch); }
.tool-dot.graph  { background: var(--tool-graph); }
.tool-dot.default{ background: var(--text-muted); }
.tool-name { font-size: 12px; font-weight: 500; flex: 1; }
.tool-duration { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
.tool-spinner { width: 10px; height: 10px; border: 1.5px solid var(--border-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.tool-card-body { display: none; padding: 0 10px 8px; }
.tool-card.open .tool-card-body { display: block; }
.tool-section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin: 6px 0 3px; }
.tool-json { font-family: var(--font-mono); font-size: 11px; background: var(--bg-base); border-radius: 4px; padding: 6px 8px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; color: var(--text-secondary); max-height: 180px; overflow-y: auto; border: 1px solid var(--border); user-select: text; -webkit-user-select: text; }
.thinking-card { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
.thinking-card-header { display: flex; align-items: center; gap: 6px; padding: 7px 10px; cursor: pointer; font-size: 11px; color: var(--text-muted); transition: var(--transition); }
.thinking-card-header:hover { background: var(--bg-hover); }
.thinking-icon { font-size: 13px; }
.thinking-card-body { display: none; padding: 0 10px 8px; }
.thinking-card.open .thinking-card-body { display: block; }
.thinking-text { font-size: 11px; color: var(--text-secondary); white-space: pre-wrap; line-height: 1.5; max-height: 200px; overflow-y: auto; }

/* =========================================================
   CHAT AREA
   ========================================================= */
#chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-base); min-width: 0; }
#messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; width: 100%; }
#messages:empty::after { content: 'Ask a question about your indexed documents.'; display: block; text-align: center; color: var(--text-muted); font-size: 13px; margin-top: 60px; }
.msg { display: flex; flex-direction: column; }
.msg.user { align-self: flex-end; align-items: flex-end; max-width: 85%; }
.msg.assistant { align-self: flex-start; align-items: flex-start; width: 85%; }
.msg-bubble { padding: 11px 15px; border-radius: var(--radius-lg); line-height: 1.65; word-break: break-word; user-select: text; -webkit-user-select: text; }
.msg.user .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 3px; font-size: 14px; display: inline-block; }
.msg.assistant .msg-bubble { background: var(--bg-surface); border: 1px solid var(--border); border-bottom-left-radius: 3px; font-size: 14px; width: 100%; }
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3,.msg-bubble h4 { margin: 14px 0 6px; font-weight: 600; color: var(--text-primary); }
.msg-bubble h1 { font-size: 18px; } .msg-bubble h2 { font-size: 16px; } .msg-bubble h3 { font-size: 14px; }
.msg-bubble p { margin: 6px 0; }
.msg-bubble ul,.msg-bubble ol { padding-left: 20px; margin: 6px 0; }
.msg-bubble li { margin: 3px 0; }
.msg-bubble code { font-family: var(--font-mono); font-size: 12px; background: var(--bg-raised); padding: 1px 5px; border-radius: 3px; color: var(--accent-hover); }
.msg-bubble pre { margin: 8px 0; }
.msg-bubble pre code { display: block; padding: 12px; border-radius: var(--radius); overflow-x: auto; font-size: 12px; background: var(--bg-base); border: 1px solid var(--border); color: var(--text-primary); }
.msg-bubble table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
.msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
.msg-bubble th { background: var(--bg-raised); font-weight: 600; }
.msg-bubble a { color: var(--accent); }
.msg-bubble blockquote { border-left: 3px solid var(--accent-dim); margin: 6px 0; padding: 4px 12px; color: var(--text-secondary); }
.msg-bubble strong { color: var(--text-primary); }
.msg-bubble.error-bubble { background: var(--red-dim); border-color: var(--red); color: var(--red); }
.typing-dots { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
.typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: blink 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
.msg-sources { margin-top: 6px; font-size: 11px; color: var(--text-muted); user-select: text; -webkit-user-select: text; }
.msg-sources a { color: var(--accent); font-size: 11px; }
.msg-meta { font-size: 10px; color: var(--text-muted); margin-top: 4px; padding: 0 2px; }

/* =========================================================
   INPUT BAR
   ========================================================= */
#input-bar { padding: 12px 16px; background: var(--bg-surface); border-top: 1px solid var(--border); flex-shrink: 0; }
#input-wrap { display: flex; align-items: flex-end; gap: 8px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 8px 12px; transition: border-color var(--transition); }
#input-wrap:focus-within { border-color: var(--accent); }
#query-input { flex: 1; resize: none; outline: none; background: transparent; color: var(--text-primary); font-size: 14px; line-height: 1.5; min-height: 66px; max-height: 140px; overflow-y: auto; }
#query-input::placeholder { color: var(--text-muted); }
#btn-send { padding: 6px 14px; background: var(--accent); color: #fff; border-radius: var(--radius); font-size: 13px; font-weight: 500; transition: background var(--transition); flex-shrink: 0; }
#btn-send:hover { background: var(--accent-hover); }
#btn-send:disabled { background: var(--bg-active); color: var(--text-muted); cursor: not-allowed; }
.input-hint { font-size: 10px; color: var(--text-muted); margin-top: 5px; padding: 0 2px; }

/* =========================================================
   TOKEN TRACKER
   ========================================================= */
#token-tracker {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
  background: var(--bg-raised);
  border: 1px solid var(--border-light);
  border-radius: 20px;
  padding: 3px 12px 3px 10px;
}
#token-bar-wrap { width: 80px; height: 4px; background: var(--bg-active); border-radius: 2px; overflow: hidden; }
#token-bar { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.3s ease, background 0.3s ease; width: 0%; }
#token-label { font-size: 11px; color: var(--text-primary); white-space: nowrap; font-weight: 500; }

/* =========================================================
   STATUS BAR
   ========================================================= */
#statusbar {
  gap: 14px;
  color: var(--text-secondary);
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; margin-right: 5px; }
.status-dot.ok  { background: var(--green); box-shadow: 0 0 6px rgba(61,214,140,0.5); }
.status-dot.err { background: var(--red);   box-shadow: 0 0 6px rgba(240,98,146,0.5); }
.status-dot.unknown { background: var(--text-muted); }
#status-agent-msg { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
#ingest-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 10px;
  border-radius: 20px;
  border: 1px solid transparent;
  transition: opacity 0.4s ease;
}
#ingest-status.running {
  color: var(--amber);
  border-color: rgba(245,166,35,0.3);
  background: var(--amber-dim);
}
#ingest-status.done {
  color: var(--green);
  border-color: rgba(61,214,140,0.3);
  background: var(--green-dim);
}
#ingest-status.error {
  color: var(--red);
  border-color: rgba(240,98,146,0.3);
  background: var(--red-dim);
}
#ingest-status .ingest-spinner {
  width: 9px; height: 9px;
  border: 1.5px solid rgba(245,166,35,0.3);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
