<!-- ═══════════════════════════════════════════════════════
     TOP BAR  —  logo + drawer toggle only
     ═══════════════════════════════════════════════════════ -->
<header id="topbar">
  <div id="logo">Local<span>Agent</span> Search Engine</div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
    <button class="tb-btn" id="btn-settings" title="Settings">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.9 11.9l1.06 1.06M3.05 12.95l1.06-1.06M11.9 4.1l1.06-1.06"/></svg>
      Set API Keys
    </button>
    <button class="tb-btn" id="btn-config" title="Config Settings">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h5"/></svg>
      Config
    </button>
    <button class="tb-btn" id="btn-docs" title="Open Documentation">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 1h8a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1z"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="11" x2="8" y2="11"/></svg>
      Docs
    </button>
    <button class="tb-btn" id="btn-theme" title="Toggle dark/light mode">
      <svg id="icon-moon" viewBox="0 0 16 16" fill="currentColor" style="color:var(--text-primary)"><path d="M14.5 10.46A6.5 6.5 0 0 1 5.54 1.5a6.5 6.5 0 1 0 8.96 8.96z"/></svg>
      <svg id="icon-sun" viewBox="0 0 16 16" fill="none" style="display:none"><circle cx="8" cy="8" r="3" fill="currentColor"/><line x1="8" y1="1" x2="8" y2="3" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="13" x2="8" y2="15" stroke="currentColor" stroke-width="1.5"/><line x1="1" y1="8" x2="3" y2="8" stroke="currentColor" stroke-width="1.5"/><line x1="13" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="3" x2="4.4" y2="4.4" stroke="currentColor" stroke-width="1.5"/><line x1="11.6" y1="11.6" x2="13" y2="13" stroke="currentColor" stroke-width="1.5"/><line x1="13" y1="3" x2="11.6" y2="4.4" stroke="currentColor" stroke-width="1.5"/><line x1="4.4" y1="11.6" x2="3" y2="13" stroke="currentColor" stroke-width="1.5"/></svg>
    </button>
    <button class="tb-btn" id="btn-drawer-toggle" title="Toggle tool drawer (Ctrl+/)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="2"/><line x1="11" y1="1" x2="11" y2="15"/></svg>
    </button>
  </div>
</header>
