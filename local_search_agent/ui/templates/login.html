<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Local Agent Search Engine</title>
<style>
  :root {
    --bg-base:      #0f1117;
    --bg-surface:   #1a1d27;
    --bg-raised:    #22263a;
    --border:       #2e3352;
    --border-light: #3d4468;
    --text-primary: #e2e6f0;
    --text-secondary:#8892b0;
    --text-muted:   #525c7a;
    --accent:       #5b7df8;
    --accent-hover: #7090ff;
    --red:          #f06292;
    --red-dim:      rgba(240,98,146,0.12);
    --radius:       8px;
    --radius-lg:    12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #card {
    width: 100%;
    max-width: 360px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  #logo { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  #logo span { color: var(--accent); }
  #subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 22px; }
  label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; display: block; }
  input[type="password"], input[type="text"] {
    width: 100%;
    padding: 9px 11px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-size: 13px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }
  button {
    width: 100%;
    margin-top: 16px;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: var(--accent-hover); }
  button:disabled { background: var(--border-light); cursor: not-allowed; }
  #error {
    margin-top: 12px;
    padding: 8px 10px;
    border-radius: var(--radius);
    background: var(--red-dim);
    color: var(--red);
    font-size: 12px;
    display: none;
  }
  #error.visible { display: block; }
  #hint { margin-top: 18px; font-size: 11px; color: var(--text-muted); line-height: 1.5; }
</style>
</head>
<body>
<div id="card">
  <div id="logo">Local<span>Agent</span> Search Engine</div>
  <div id="subtitle">Sign in with the API key your admin gave you.</div>
  <form id="login-form">
    <label for="api-key">API key</label>
    <input type="password" id="api-key" name="api-key" placeholder="lsa_..." autocomplete="off" autofocus />
    <button type="submit" id="submit-btn">Sign in</button>
    <div id="error"></div>
  </form>
  <div id="hint">
    Your key is used once to establish a session and is never stored in
    this browser after that.
  </div>
</div>
<script>
  const form = document.getElementById('login-form');
  const keyInput = document.getElementById('api-key');
  const errorBox = document.getElementById('error');
  const submitBtn = document.getElementById('submit-btn');

  const params = new URLSearchParams(window.location.search);
  const nextUrl = params.get('next') || '/';

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const key = keyInput.value.trim();
    if (!key) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';
    errorBox.classList.remove('visible');

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: key }),
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.detail || 'Invalid API key.');
      }
      keyInput.value = '';
      window.location.href = nextUrl;
    } catch (err) {
      errorBox.textContent = err.message || 'Sign in failed.';
      errorBox.classList.add('visible');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
